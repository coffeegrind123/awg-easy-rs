volumes:
  etc_wireguard:

services:
  awg-easy:
    build: .
    container_name: awg-easy
    volumes:
      - etc_wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    restart: unless-stopped
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1
    environment:
      - PORT=51821
      - HOST=0.0.0.0
      # Uncomment for automatic initial setup:
      # - INIT_ENABLED=true
      # - INIT_USERNAME=admin
      # - INIT_PASSWORD=changeme
      # - INIT_HOST=vpn.example.com
      # - INIT_PORT=51820
